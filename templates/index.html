<!DOCTYPE html>
<html>
<head>
<style>
body{font-family:Arial;background:#e8f5e9}
.box{
    width:90%;
    max-width:400px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    margin-top:40px;
}
input,button{
    width:100%;
    padding:10px;
    margin:8px 0;
}
button{background:green;color:white;border:none}
</style>
</head>

<body>

<div class="box">
<h2>🍲 Donate Food</h2>

<form action="/submit" method="POST">
<input name="name" placeholder="Name">
<input name="food" placeholder="Food">
<input name="quantity" placeholder="Quantity">
<button>Submit</button>
</form>

<a href="/logout">Logout</a>
</div>

</body>
</html>
