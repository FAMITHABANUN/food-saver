<!DOCTYPE html>
<html>
<head>
<style>
body{
    font-family:Arial;
    background:#f1f8e9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.box{
    background:white;
    padding:30px;
    border-radius:15px;
    width:90%;
    max-width:350px;
}
input,button{
    width:100%;
    padding:10px;
    margin:10px 0;
}
button{
    background:#43a047;
    color:white;
    border:none;
}
</style>
</head>
<body>

<div class="box">
<h2>📝 Register</h2>

<form method="POST">
<input name="username" placeholder="Username">
<input name="password" type="password" placeholder="Password">
<button>Register</button>
</form>

<a href="/login">Back to login</a>
</div>

</body>
</html>
