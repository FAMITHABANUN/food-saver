<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    font-family: Poppins;
    background-image: url("/static/1000128894.jpg");
    background-size: cover;
    background-position: center;
    min-height: 100vh;
}

.card {
    background: rgba(255,255,255,0.25);
    backdrop-filter: blur(10px);
    padding: 25px;
    border-radius: 20px;
    width: 350px;
    margin: auto;
    margin-top: 100px;
}
</style>
</head>

<body>

<div class="card">

<h2 class="text-center font-bold text-xl mb-4">Create Account</h2>

<form method="POST">

<input type="text" name="name" placeholder="Name"
class="w-full p-2 mb-3 border rounded" required>

<input type="email" name="email" placeholder="Email"
class="w-full p-2 mb-3 border rounded" required>

<div class="relative mb-3">
<input type="password" id="password" name="password"
placeholder="Password"
class="w-full p-2 border rounded pr-10" required>

<button type="button" onclick="toggle()"
class="absolute right-2 top-2">👁️</button>
</div>

<button type="submit"
class="w-full bg-green-500 text-white p-2 rounded">
Register
</button>

</form>

</div>

<script>
function toggle(){
    const p = document.getElementById("password");
    p.type = p.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
