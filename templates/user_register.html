<!DOCTYPE html>
<html>
<head>
<title>User Register</title>

<style>

body{
    margin:0;
    padding:0;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    font-family:Arial;

    background: linear-gradient(135deg,#43cea2,#185a9d);
}

.box{

    width:320px;

    background:white;

    padding:30px;

    border-radius:20px;

    box-shadow:0px 5px 20px rgba(0,0,0,0.3);
}

h2{
    text-align:center;
    color:#185a9d;
}

input{

    width:100%;

    padding:12px;

    margin-top:12px;

    border-radius:8px;

    border:1px solid gray;
}

button{

    width:100%;

    padding:12px;

    margin-top:20px;

    border:none;

    border-radius:8px;

    background:#185a9d;

    color:white;

    font-size:16px;

    cursor:pointer;
}

</style>
</head>

<body>

<div class="box">

<h2>📝 User Register</h2>

<form method="POST">

<input type="text" placeholder="Username" required>

<input type="email" placeholder="Email" required>

<input type="password" placeholder="Password" required>

<button type="submit">Register</button>

</form>

</div>

</body>
</html>
