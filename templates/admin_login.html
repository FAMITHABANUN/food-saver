<!DOCTYPE html>
<html>
<head>
<title>Food Saver Login</title>

<style>

body{
    margin:0;
    padding:0;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    font-family:Arial;

    background: linear-gradient(135deg,#00c853,#64dd17,#b2ff59);
}

.box{

    width:320px;

    background:white;

    padding:30px;

    border-radius:20px;

    box-shadow:0px 5px 20px rgba(0,0,0,0.3);
}

h2{
    text-align:center;
    color:#00c853;
}

input{

    width:100%;

    padding:12px;

    margin-top:12px;

    border-radius:8px;

    border:1px solid gray;
}

button{

    width:100%;

    padding:12px;

    margin-top:20px;

    border:none;

    border-radius:8px;

    background:#00c853;

    color:white;

    font-size:16px;

    cursor:pointer;
}

button:hover{
    background:#009624;
}

p{
    text-align:center;
}

a{
    color:#00c853;
}

</style>
</head>

<body>

<div class="box">

<h2>🍱 Food Saver Login</h2>

<form method="POST">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<p>New User? <a href="/register">Register</a></p>

<p>Admin: admin / foodsaver2026</p>

</div>

</body>
</html>
