<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Saver | Admin Login</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght=700&family=Poppins:wght=300;400;500;600;700&display=swap" rel="stylesheet">

<script>
tailwind.config = {
    theme: {
        extend: {
            fontFamily: {
                serif: ['Cormorant Garamond', 'serif'],
                sans: ['Poppins', 'sans-serif']
            }
        }
    }
}
</script>

<style>
body {
    font-family: 'Poppins', sans-serif;
}
</style>

</head>

<body class="min-h-screen flex items-center justify-center px-6 relative overflow-hidden bg-center bg-no-repeat bg-white" 
      style="background-image: url('/static/1000130063.jpg'); background-size: 650px;">

    <div class="relative w-full max-w-md z-10">
        
        <div class="bg-white/30 backdrop-blur-[6px] border border-white/60 rounded-3xl p-8 md:p-10 shadow-[0_8px_32px_0_rgba(0,0,0,0.05)] relative overflow-hidden">
            
            <div class="flex flex-col items-center justify-center text-center mb-6">
                <div class="bg-emerald-500/10 p-4 rounded-2xl border border-emerald-500/20 mb-3">
                    <svg xmlns="http://www.w3.org/2000/svg"
                         class="h-8 w-8 text-emerald-600"
                         fill="none"
                         viewBox="0 0 24 24"
                         stroke="currentColor">
                        <path stroke-linecap="round"
                              stroke-linejoin="round"
                              stroke-width="2"
                              d="M12 11c1.657 0 3-1.343 3-3V6a3 3 0 10-6 0v2c0 1.657 1.343 3 3 3zm6 0h-1V8a5 5 0 10-10 0v3H6a2 2 0 00-2 2v7a2 2 0 002 2h12a2 2 0 002-2v-7a2 2 0 00-2-2z"/>
                    </svg>
                </div>

                <h1 class="font-serif text-4xl font-bold text-slate-800 tracking-wide">
                    Admin Login
                </h1>
                <p class="text-xs text-slate-500 mt-1 font-light">Food Saver Management System</p>
            </div>

            {% with messages = get_flashed_messages() %}
              {% if messages %}
                <div class="mb-4 p-4 rounded-xl bg-red-500/10 border border-red-500/20 text-red-700 text-sm text-center font-medium">
                  {% for message in messages %}
                    {{ message }}
                  {% endfor %}
                </div>
              {% endif %}
            {% endwith %}

            <form method="POST" class="space-y-4">

                <div>
                    <input
                        type="text"
                        name="username"
                        placeholder="Enter Username"
                        required
                        class="w-full bg-white/80 border border-slate-200 text-slate-800 placeholder-slate-400 rounded-xl py-3.5 px-5 focus:outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/20 transition duration-300 font-light text-sm shadow-sm"
                    >
                </div>

                <div>
                    <input
                        type="password"
                        name="password"
                        placeholder="Enter Password"
                        required
                        class="w-full bg-white/80 border border-slate-200 text-slate-800 placeholder-slate-400 rounded-xl py-3.5 px-5 focus:outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/20 transition duration-300 font-light text-sm shadow-sm"
                    >
                </div>

                <button
                    type="submit"
                    class="w-full py-3.5 rounded-xl bg-emerald-600 hover:bg-emerald-500 text-white font-bold text-md shadow-md active:scale-[0.98] transition-all duration-200 uppercase tracking-wider mt-2"
                >
                    Sign In
                </button>

            </form>

            <div class="mt-6 text-center border-t border-slate-200/40 pt-4">
                <p class="text-xs text-slate-500 tracking-wide font-light">
                    🔒 Default Access: <span class="text-emerald-600 font-medium">admin</span> / <span class="text-emerald-600 font-medium">admin123</span>
                </p>
            </div>

        </div>
    </div>

</body>
</html>
