<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
background:linear-gradient(135deg,#ff512f,#dd2476);
}

.box{
background:white;
padding:30px;
border-radius:20px;
width:320px;
}

h2{
text-align:center;
color:#dd2476;
}

input{
width:100%;
padding:12px;
margin-top:12px;
border-radius:10px;
border:1px solid gray;
}

button{
width:100%;
padding:12px;
margin-top:20px;
background:#dd2476;
color:white;
border:none;
border-radius:10px;
}

p{
text-align:center;
}

</style>
</head>

<body>

<div class="box">

<h2>🔐 Admin Login</h2>

<form method="POST">

<input type="text" name="username" placeholder="Admin Username" required>

<input type="password" name="password" placeholder="Admin Password" required>

<button type="submit">Login</button>

</form>

<p>admin / foodsaver2026</p>

</div>

</body>
</html>
