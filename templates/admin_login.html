<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Saver | Admin Login</title>

<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script>
tailwind.config = {
    theme: {
        extend: {
            fontFamily: {
                serif: ['Cormorant Garamond', 'serif'],
                sans: ['Poppins', 'sans-serif']
            }
        }
    }
}
</script>

<style>
body{
    font-family:'Poppins',sans-serif;
}
</style>

</head>

<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-[#22c55e] to-[#10b981] px-6">

    <!-- Background Glow -->
    <div class="absolute top-0 left-0 w-80 h-80 bg-white/10 blur-[120px] rounded-full"></div>

    <div class="absolute bottom-0 right-0 w-80 h-80 bg-emerald-300/20 blur-[120px] rounded-full"></div>

    <!-- Admin Login Card -->
    <div class="relative w-full max-w-md">

        <div class="bg-[#1a2328]/90 backdrop-blur-md border border-white/10 rounded-3xl shadow-2xl p-10 md:p-12">

            <!-- Header -->
            <div class="flex items-center justify-center gap-4 mb-10">

                <!-- Lock Icon -->
                <div class="relative">

                    <div class="absolute inset-0 bg-orange-500/30 blur-xl rounded-full"></div>

                    <svg xmlns="http://www.w3.org/2000/svg"
                         class="relative h-10 w-10 text-orange-400"
                         fill="none"
                         viewBox="0 0 24 24"
                         stroke="currentColor">

                        <path stroke-linecap="round"
                              stroke-linejoin="round"
                              stroke-width="2"
                              d="M12 11c1.657 0 3-1.343 3-3V6a3 3 0 10-6 0v2c0 1.657 1.343 3 3 3zm6 0h-1V8a5 5 0 10-10 0v3H6a2 2 0 00-2 2v7a2 2 0 002 2h12a2 2 0 002-2v-7a2 2 0 00-2-2z"/>

                    </svg>

                </div>

                <h1 class="font-serif text-5xl font-bold text-white">
                    Admin Login
                </h1>

            </div>

            <!-- Login Form -->
            <form method="POST" class="space-y-6">

                <!-- Username -->
                <input
                    type="text"
                    name="username"
                    placeholder="Enter Username"
                    required
                    class="w-full bg-[#24313f]/70 border border-gray-600 text-white placeholder-gray-400 rounded-2xl py-4 px-5 focus:outline-none focus:border-emerald-400 focus:ring-1 focus:ring-emerald-400 transition duration-300"
                >

                <!-- Password -->
                <input
                    type="password"
                    name="password"
                    placeholder="Enter Password"
                    required
                    class="w-full bg-[#24313f]/70 border border-gray-600 text-white placeholder-gray-400 rounded-2xl py-4 px-5 focus:outline-none focus:border-emerald-400 focus:ring-1 focus:ring-emerald-400 transition duration-300"
                >

                <!-- Login Button -->
                <button
                    type="submit"
                    class="w-full py-4 rounded-full bg-white text-[#14532d] font-bold text-lg shadow-lg hover:scale-[1.03] transition-transform duration-200"
                >
                    Login
                </button>

            </form>

            <!-- Credentials Hint -->
            <div class="mt-6 text-center">

                <p class="text-sm text-gray-400">
                    Default: admin / admin123
                </p>

            </div>

        </div>

    </div>

</body>
</html>
