<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<style>

body{
margin:0;
padding:20px;
font-family:Arial;
background:linear-gradient(135deg,#00c853,#69f0ae);
}

.container{
background:white;
padding:25px;
border-radius:20px;
max-width:900px;
margin:auto;
}

h1{
text-align:center;
color:#00c853;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th{
background:#00c853;
color:white;
padding:12px;
}

td{
padding:12px;
border-bottom:1px solid #ccc;
text-align:center;
}

</style>
</head>

<body>

<div class="container">

<h1>🍱 Food Saver Admin Panel</h1>

<table>

<tr>
<th>Name</th>
<th>Food</th>
<th>Quantity</th>
<th>Address</th>
</tr>

{% for item in donations %}

<tr>
<td>{{ item.name }}</td>
<td>{{ item.food }}</td>
<td>{{ item.quantity }}</td>
<td>{{ item.address }}</td>
</tr>

{% endfor %}

</table>

</div>

</body>
</html>
