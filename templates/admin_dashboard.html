<!DOCTYPE html>
<html>
<head>
<title>Food Saver Admin</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:Arial;

    background: linear-gradient(135deg,#00c853,#00e676,#69f0ae);

    min-height:100vh;

    padding:20px;
}

.container{

    max-width:900px;

    margin:auto;

    background:white;

    border-radius:20px;

    padding:25px;

    box-shadow:0px 8px 25px rgba(0,0,0,0.3);
}

h1{

    text-align:center;

    color:#00c853;

    margin-bottom:25px;
}

.button{

    display:inline-block;

    padding:12px 20px;

    background:#00c853;

    color:white;

    text-decoration:none;

    border-radius:10px;

    margin-bottom:20px;
}

table{

    width:100%;

    border-collapse:collapse;
}

th{

    background:#00c853;

    color:white;

    padding:12px;
}

td{

    padding:12px;

    border-bottom:1px solid #ccc;

    text-align:center;
}

tr:hover{

    background:#f1f1f1;
}

.empty{

    text-align:center;

    color:gray;

    margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<h1>🍱 Food Saver Admin Dashboard</h1>

<a class="button" href="/donate">
+ Add Donation
</a>

{% if donations %}

<table>

<tr>
<th>Name</th>
<th>Food</th>
<th>Quantity</th>
<th>Address</th>
</tr>

{% for item in donations %}

<tr>
<td>{{ item.name }}</td>
<td>{{ item.food }}</td>
<td>{{ item.quantity }}</td>
<td>{{ item.address }}</td>
</tr>

{% endfor %}

</table>

{% else %}

<p class="empty">
No donations available yet.
</p>

{% endif %}

</div>

</body>
</html>
