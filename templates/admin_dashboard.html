<!DOCTYPE html>
<html>
<head>
<style>
body{font-family:Arial;background:#f5f5f5}

.card{
    background:white;
    padding:20px;
    margin:20px;
    border-radius:10px;
    text-align:center;
}

table{
    width:90%;
    margin:auto;
    border-collapse:collapse;
}

th,td{
    padding:10px;
    border:1px solid #ccc;
    text-align:center;
}

th{background:#00c853;color:white}

.delete{
    color:red;
}
</style>
</head>

<body>

<div class="card">
<h2>📊 Admin Dashboard</h2>
<h3>Total Donations: {{ total }}</h3>
</div>

<table>
<tr>
<th>Name</th><th>Food</th><th>Qty</th><th>Action</th>
</tr>

{% for row in data %}
<tr>
<td>{{ row[0] }}</td>
<td>{{ row[1] }}</td>
<td>{{ row[2] }}</td>
<td><a class="delete" href="/delete/{{ loop.index0 }}">Delete</a></td>
</tr>
{% endfor %}
</table>

<br>
<center><a href="/logout">Logout</a></center>

</body>
</html>
