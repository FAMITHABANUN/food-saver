<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Saver | Success</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        .serif-title {
            font-family: 'Cormorant Garamond', serif;
        }

        .body-font {
            font-family: 'Poppins', sans-serif;
        }
    </style>
</head>

<body class="body-font bg-gradient-to-br from-green-500 to-emerald-600 min-h-screen flex items-center justify-center p-6">

    <div class="bg-slate-900/85 backdrop-blur-md border border-white/10 shadow-2xl rounded-3xl p-10 md:p-12 max-w-md w-full text-center">

        <!-- Success Header -->
        <div class="flex items-center justify-center gap-4 mb-6">

            <div class="w-16 h-16 rounded-full bg-green-500/20 border border-green-400 flex items-center justify-center shadow-lg">
                <span class="text-3xl text-green-400">✓</span>
            </div>

            <h1 class="serif-title text-4xl font-bold text-white">
                Success!
            </h1>

        </div>

        <!-- Message -->
        <p class="text-slate-300 text-lg leading-relaxed mb-10">
            Food Donation Submitted Successfully!
        </p>

        <!-- Back to Home Button -->
        <a href="{{ url_for('home') }}"
           class="block w-full bg-white text-green-700 font-semibold py-4 rounded-full shadow-lg hover:scale-[1.03] transition-transform duration-200">

            Back to Home

        </a>

    </div>

</body>
</html>
