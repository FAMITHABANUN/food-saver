<!DOCTYPE html>
<html>
<head>
<title>Success</title>

<style>

body{

    margin:0;

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    font-family:Arial;

    background: linear-gradient(135deg,#00b09b,#96c93d);
}

.box{

    background:white;

    padding:40px;

    border-radius:20px;

    text-align:center;

    box-shadow:0px 5px 20px rgba(0,0,0,0.3);
}

h1{
    color:#00b09b;
}

a{

    text-decoration:none;

    color:white;

    background:#00b09b;

    padding:10px 20px;

    border-radius:8px;
}

</style>
</head>

<body>

<div class="box">

<h1>{{ message }}</h1>

<br>

<a href="/login">Back to Login</a>

</div>

</body>
</html>
