<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Saver | Success</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght=700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/static/style.css">
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-image: url("/static/1000128894.jpg");
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #ffffff;
        }
        .serif-title {
            font-family: 'Cormorant Garamond', serif;
        }
        /* Beautiful vibrant frosted glass card effect matching your other forms */
        .glass-card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 2px solid rgba(255, 255, 255, 0.45);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-center items-center p-6">

    <div class="glass-card w-full max-w-sm rounded-3xl p-8 text-center shadow-2xl">
        
        <div class="w-16 h-16 bg-emerald-500/20 rounded-full flex items-center justify-center mx-auto mb-4 border border-emerald-500/40">
            <span class="text-emerald-600 text-3xl font-bold">✓</span>
        </div>
        
        <h1 class="serif-title text-3xl font-bold text-gray-800 mb-2">Success!</h1>
        <p class="text-gray-700 text-sm font-medium mb-6">Food Donation Submitted Successfully!</p>
        
        <a href="{{ url_for('home') }}" class="block w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3.5 rounded-full text-center transition-all shadow-md transform hover:scale-[1.02] duration-200">
            Back to Home
        </a>
    </div>

</body>
</html>
