<!DOCTYPE html>
<html>
<head>
<title>User Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
background:linear-gradient(135deg,#11998e,#38ef7d);
}

.box{
background:white;
padding:30px;
border-radius:20px;
width:320px;
box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

h2{
text-align:center;
color:#11998e;
}

input{
width:100%;
padding:12px;
margin-top:12px;
border-radius:10px;
border:1px solid gray;
}

button{
width:100%;
padding:12px;
margin-top:20px;
background:#11998e;
color:white;
border:none;
border-radius:10px;
font-size:16px;
}

a{
text-decoration:none;
color:#11998e;
}

p{
text-align:center;
}

</style>
</head>

<body>

<div class="box">

<h2>🍱 Food Saver</h2>

<form method="POST">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">User Login</button>

</form>

<p><a href="/register">New User Register</a></p>

<p><a href="/admin-login">Admin Login</a></p>

</div>

</body>
</html>
