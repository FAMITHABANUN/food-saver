<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Saver | User Login</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/static/style.css">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-image: url("/static/1000128894.jpg");
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #ffffff;
        }
        .serif-title {
            font-family: 'Cormorant Garamond', serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 2px solid rgba(255, 255, 255, 0.45);
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-6 relative">

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
        <div id="flashAlert" class="fixed top-6 left-1/2 transform -translate-x-1/2 z-50 w-11/12 max-w-sm bg-white/90 backdrop-blur-md rounded-2xl p-4 flex items-center gap-3 border border-emerald-500/30 shadow-2xl">
            <div class="w-8 h-8 bg-emerald-500/20 rounded-full flex items-center justify-center text-sm text-emerald-600">✉️</div>
            <div class="flex-1 text-xs text-gray-800 font-medium">{{ message }}</div>
            <button onclick="document.getElementById('flashAlert').remove()" class="text-gray-500 hover:text-gray-800 font-bold px-1">✕</button>
        </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <div class="glass-card rounded-3xl shadow-2xl p-8 md:p-10 w-full max-w-md">

        <div class="flex items-center justify-center gap-3 mb-8">
            <span class="text-4xl">🔐</span>
            <h1 class="serif-title text-4xl font-bold text-gray-800">
                User Login
            </h1>
        </div>

        <form action="{{ url_for('user_login') }}" method="POST" class="space-y-5 shadow-none p-0 bg-transparent w-full mt-0" autocomplete="off">
            
            <div>
                <label class="block text-gray-800 text-left mb-1 font-semibold ml-1">Email Address</label>
                <input
                    type="email"
                    name="email"
                    placeholder="Enter your email"
                    required
                    autocomplete="new-password"
                    class="w-full bg-white/70 border border-white/80 rounded-xl px-4 py-3 text-gray-900 placeholder-gray-500 focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 outline-none margin-0 shadow-inner"
                >
            </div>

            <div>
                <label class="block text-gray-800 text-left mb-1 font-semibold ml-1">Password</label>
                <input
                    type="password"
                    name="password"
                    placeholder="Enter your password"
                    required
                    autocomplete="new-password"
                    class="w-full bg-white/70 border border-white/80 rounded-xl px-4 py-3 text-gray-900 placeholder-gray-500 focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 outline-none margin-0 shadow-inner"
                >
            </div>

            <button
                type="submit"
                class="w-full bg-emerald-500 text-white font-bold py-3.5 rounded-full hover:bg-emerald-600 hover:scale-[1.02] duration-200 transition-all mt-2 shadow-md"
            >
                Login Securely
            </button>
        </form>

        <p class="text-center text-gray-700 text-xs mt-6 font-medium">
            Don't have an account yet? <a href="{{ url_for('user_register') }}" class="text-emerald-700 font-bold hover:underline ml-1">Register here</a>
        </p>
    </div>

</body>
</html>
