<!DOCTYPE html>
<html>
<head>
<title>Donate Food</title>

<style>

body{
    margin:0;
    padding:0;

    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    font-family:Arial;

    background: linear-gradient(135deg,#56ab2f,#a8e063);
}

.box{

    width:350px;

    background:white;

    padding:30px;

    border-radius:20px;

    box-shadow:0px 5px 20px rgba(0,0,0,0.3);
}

h2{
    text-align:center;
    color:#56ab2f;
}

input{

    width:100%;

    padding:12px;

    margin-top:12px;

    border-radius:8px;

    border:1px solid gray;
}

button{

    width:100%;

    padding:12px;

    margin-top:20px;

    border:none;

    border-radius:8px;

    background:#56ab2f;

    color:white;

    font-size:16px;

    cursor:pointer;
}

</style>
</head>

<body>

<div class="box">

<h2>🍲 Donate Food</h2>

<form method="POST">

<input type="text" name="name" placeholder="Your Name" required>

<input type="text" name="food" placeholder="Food Item" required>

<input type="text" name="quantity" placeholder="Quantity" required>

<input type="text" name="address" placeholder="Address" required>

<button type="submit">Donate</button>

</form>

</div>

</body>
</html>
