<!DOCTYPE html>
<html>
<head>
<title>Donate Food</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    font-family:Arial;

    background: linear-gradient(135deg,#56ab2f,#a8e063);
}

.box{

    width:90%;
    max-width:380px;

    background:white;

    padding:30px;

    border-radius:25px;

    box-shadow:0px 8px 25px rgba(0,0,0,0.3);
}

h2{

    text-align:center;

    color:#56ab2f;

    margin-bottom:20px;
}

input{

    width:100%;

    padding:14px;

    margin-top:12px;

    border-radius:10px;

    border:1px solid gray;

    font-size:16px;
}

button{

    width:100%;

    padding:14px;

    margin-top:20px;

    border:none;

    border-radius:12px;

    background:#56ab2f;

    color:white;

    font-size:18px;

    cursor:pointer;
}

button:hover{

    background:#2e7d32;
}

</style>

</head>

<body>

<div class="box">

<h2>🍲 Donate Food</h2>

<form method="POST" action="/submit-donation">

<input type="text" name="name" placeholder="Your Name" required>

<input type="text" name="food" placeholder="Food Item" required>

<input type="text" name="quantity" placeholder="Quantity" required>

<input type="text" name="address" placeholder="Address" required>

<button type="submit">Submit Donation</button>

</form>

</div>

</body>
</html>
