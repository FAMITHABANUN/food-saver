<!DOCTYPE html>
<html>
<head>
<title>Donate Food</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
background:linear-gradient(135deg,#00b09b,#96c93d);
}

.box{
background:white;
padding:30px;
border-radius:20px;
width:350px;
}

h2{
text-align:center;
color:#00b09b;
}

input{
width:100%;
padding:12px;
margin-top:12px;
border-radius:10px;
border:1px solid gray;
}

button{
width:100%;
padding:12px;
margin-top:20px;
background:#00b09b;
color:white;
border:none;
border-radius:10px;
}

</style>
</head>

<body>

<div class="box">

<h2>🍲 Donate Food</h2>

<form method="POST">

<input type="text" name="name" placeholder="Your Name" required>

<input type="text" name="food" placeholder="Food Item" required>

<input type="text" name="quantity" placeholder="Quantity" required>

<input type="text" name="address" placeholder="Address" required>

<button type="submit">Submit Donation</button>

</form>

</div>

</body>
</html>
